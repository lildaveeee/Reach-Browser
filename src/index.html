<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reach</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="browser-shell">
      <div class="toolbar">
        <div class="tab-row">
          <div class="tab-strip" id="tab-strip"></div>
          <div class="tab-actions">
            <button class="tab new-tab" id="new-tab-btn" title="New tab">
              <img src="./icons/plus.svg" alt="New tab" />
            </button>
            <button id="close-app-btn" title="Close app">
              <img src="./icons/close.svg" alt="Close app" />
            </button>
          </div>
        </div>
        <div class="navigation-bar">
          <div class="nav-controls">
            <input id="address-bar" type="text" placeholder="Enter URL or search query" autocomplete="off" spellcheck="false" />
            <div class="nav-btn-row">
              <button id="nav-back" title="Back">
                <img src="./icons/caret-back.svg" alt="Back" />
              </button>
              <button id="nav-forward" title="Forward">
                <img src="./icons/caret-forward.svg" alt="Forward" />
              </button>
              <button id="nav-reload" title="Reload">
                <img src="./icons/refresh.svg" alt="Reload" class="reload-icon" />
              </button>
              <button id="nav-home" title="Home">
                <img src="./icons/home.svg" alt="Home" />
              </button>
            </div>
            <div class="icon-btn-row">
              <button id="bookmarks-btn" title="Bookmarks">
                <img src="./icons/bookmark.svg" alt="Bookmarks" />
              </button>
              <button id="video-popout-btn" title="Pop Out" style="display:none;">
                <img src="./icons/popout.svg" alt="Pop out" />
              </button>
              <button id="downloads-btn" title="Downloads">
                <img src="./icons/download.svg" alt="Downloads" />
                <span id="downloads-badge" class="downloads-badge" aria-hidden="true"></span>
              </button>
              <button id="settings-btn" title="Settings">
                <img src="./icons/hamburger.svg" alt="Settings" />
              </button>
            </div>
          </div>
        </div>
      </div>
      <div id="webview-container" class="webview-container"></div>
    </div>
    <div id="search-overlay" class="search-overlay" aria-hidden="true">
      <div class="search-dialog">
        <input id="search-overlay-input" type="text" placeholder="Search or enter URL" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <div id="settings-modal" class="settings-modal" aria-hidden="true">
      <div class="settings-panel">
        <div class="settings-header">
          <div>
            <h2>Reach Settings</h2>
          </div>
          <button id="settings-close" class="settings-close" title="Close settings">
            <img src="./icons/close.svg" alt="Close" />
          </button>
        </div>
        <div class="settings-tabs" role="tablist">
          <button class="settings-tab active" data-tab="general" role="tab">General</button>
          <button class="settings-tab" data-tab="keybinds" role="tab">Keybinds</button>
          <button class="settings-tab" data-tab="personalisation" role="tab">Personalisation</button>
          <button class="settings-tab" data-tab="privacy" role="tab">Privacy</button>
          <button class="settings-tab" data-tab="history" role="tab">History</button>
        </div>
        <div class="settings-body">
          <section class="settings-section active" data-section="general">
            <h3>General</h3>
            <div class="settings-control" style="margin-top:24px;">
              <div id="update-status" style="font-size:0.82rem;color:var(--muted);padding:2px 0 8px;"></div>
              <button id="check-update-btn" class="settings-action">Check for updates</button>
            </div>
          </section>  
          <section class="settings-section" data-section="keybinds">
            <h3>Keybinds</h3>
            <div class="settings-control">
              <label for="tab-middle-click-action">Middle-click on tab:</label>
              <select id="tab-middle-click-action">
                <option value="close">Close tab</option>
                <option value="none">No action</option>
              </select>
            </div>
            <div class="settings-control">
              <label for="shortcut-open-search">Open search overlay</label>
              <input id="shortcut-open-search" type="text" placeholder="Ctrl+Space" />
            </div>
            <div class="settings-control">
              <label for="shortcut-mute-tab">Mute tab shortcut</label>
              <input id="shortcut-mute-tab" type="text" placeholder="Ctrl+M" />
            </div>
            <div class="settings-control">
              <label for="shortcut-refresh-tab">Refresh tab shortcut</label>
              <input id="shortcut-refresh-tab" type="text" placeholder="F5" />
            </div>
            <div class="settings-control">
              <label for="shortcut-find-in-page">Find in page</label>
              <input id="shortcut-find-in-page" type="text" placeholder="Control+F" />
            </div>
            <div class="settings-control">
              <label for="shortcut-undo-tab">Navigate back (undo)</label>
              <input id="shortcut-undo-tab" type="text" placeholder="Alt+ArrowLeft" />
            </div>
            <div class="settings-control">
              <label for="shortcut-redo-tab">Navigate forward (redo)</label>
              <input id="shortcut-redo-tab" type="text" placeholder="Alt+ArrowRight" />
            </div>
            <div class="settings-control">
              <label for="shortcut-reopen-closed">Reopen closed tab</label>
              <input id="shortcut-reopen-closed" type="text" placeholder="Ctrl+Shift+T" />
            </div>
            <div class="settings-control">
              <label for="shortcut-switch-forward">Switch tab (forward)</label>
              <input id="shortcut-switch-forward" type="text" placeholder="Control+Tab" />
            </div>
            <div class="settings-control">
              <label for="shortcut-switch-back">Switch tab (back)</label>
              <input id="shortcut-switch-back" type="text" placeholder="Control+Shift+Tab" />
            </div>
            <div class="settings-control">
              <label for="shortcut-new-tab">New tab shortcut</label>
              <input id="shortcut-new-tab" type="text" placeholder="Control+N" />
            </div>
            <div class="settings-control">
              <label for="shortcut-toggle-tabs">Toggle tab bar</label>
              <input id="shortcut-toggle-tabs" type="text" placeholder="Control+B" />
            </div>
            <div class="settings-control">
              <label for="shortcut-split-screen">Split current with next (side-by-side)</label>
              <input id="shortcut-split-screen" type="text" placeholder="Control+\\" />
            </div>
            <div class="settings-control">
              <label>Website shortcuts</label>
              <div id="website-shortcuts"></div>
            </div>
          </section>
          <section class="settings-section" data-section="personalisation">
            <h3>Personalisation</h3>
            <div class="settings-control">
              <label for="theme-accent">Accent color</label>
              <input type="color" id="theme-accent" />
            </div>
            <div class="settings-control theme-gradient-dependent hidden">
              <label for="theme-gradient-accent">Accent gradient color</label>
              <input type="color" id="theme-gradient-accent" />
            </div>
            <div class="settings-control">
              <label for="theme-surface">Panel surface color</label>
              <input type="color" id="theme-surface" />
            </div>
            <div class="settings-control theme-gradient-dependent hidden">
              <label for="theme-gradient-surface">Panel gradient color</label>
              <input type="color" id="theme-gradient-surface" />
            </div>
            <div class="settings-control">
              <label for="theme-background">Background color</label>
              <input type="color" id="theme-background" />
            </div>
            <div class="settings-control">
              <label for="theme-input">Input field color</label>
              <input type="color" id="theme-input" />
            </div>
            <div class="settings-control">
              <label for="theme-border-color">Border color</label>
              <input type="color" id="theme-border-color" />
            </div>
            <div class="settings-control">
              <label for="theme-border-width">Border width (px)</label>
              <input type="number" id="theme-border-width" min="0" max="8" step="1" />
            </div>
            <div class="settings-control">
              <label for="theme-tab-active-bg">Selected tab color</label>
              <input type="color" id="theme-tab-active-bg" />
            </div>
            <div class="settings-control theme-gradient-dependent hidden">
              <label for="theme-gradient-tab-active">Selected tab gradient color</label>
              <input type="color" id="theme-gradient-tab-active" />
            </div>
            <div class="settings-control">
              <label for="theme-tab-inactive-bg">Inactive tab color</label>
              <input type="color" id="theme-tab-inactive-bg" />
            </div>
            <div class="settings-control theme-gradient-dependent hidden">
              <label for="theme-gradient-tab-inactive">Inactive tab gradient color</label>
              <input type="color" id="theme-gradient-tab-inactive" />
            </div>
            <div class="settings-control">
              <label for="theme-tab-active-text">Selected tab text</label>
              <input type="color" id="theme-tab-active-text" />
            </div>
            <div class="settings-control">
              <label for="theme-tab-inactive-text">Inactive tab text</label>
              <input type="color" id="theme-tab-inactive-text" />
            </div>
            <div class="settings-control">
              <label for="theme-settings-font-color">Settings font color</label>
              <input type="color" id="theme-settings-font-color" />
            </div>
            <div class="settings-control switch-control">
              <label for="theme-gradient">Enable gradient</label>
              <input type="checkbox" id="theme-gradient" />
            </div>
            <div class="settings-control">
              <label for="theme-surface-pattern">Panel surface pattern</label>
              <select id="theme-surface-pattern">
                <option value="none">None (solid / gradient)</option>
                <option value="blobs">Blurred blobs</option>
                <option value="sharpblobs">Paint blobs</option>
                <option value="dots">Polka dots</option>
                <option value="grid">Fine grid</option>
                <option value="noise">Paper noise</option>
                <option value="stripes">Diagonal stripes</option>
                <option value="topography">Topography lines</option>
                <option value="hexagons">Semi-Circles</option>
              </select>
            </div>
            <div id="surface-pattern-color-control" class="settings-control hidden">
              <label for="theme-surface-pattern-color">Pattern tint color</label>
              <input type="color" id="theme-surface-pattern-color" value="#7c3aed" />
            </div>
            <div id="surface-pattern-opacity-control" class="settings-control hidden">
              <label for="theme-surface-pattern-opacity">Pattern opacity (0–100)</label>
              <input type="number" id="theme-surface-pattern-opacity" min="0" max="100" step="5" value="18" />
            </div>
            <div class="settings-control">
              <label for="tab-position">Tab bar position</label>
              <select id="tab-position">
                <option value="top">Top</option>
                <option value="bottom">Bottom</option>
                <option value="left">Left</option>
                <option value="right">Right</option>
              </select>
            </div>            
            <div id="vertical-tab-width-control" class="settings-control">
              <label for="vertical-tab-width" class="range-label">
                <span>Sidebar width</span>
                <span class="range-value"><span id="vertical-tab-width-display">10</span>%</span>
              </label>
              <input type="range" id="vertical-tab-width" min="5" max="30" step="1" value="10">
            </div>
            <h4>Saved themes</h4>
            <div class="settings-control">
              <div class="theme-actions-row">
                <button id="save-theme-btn" class="settings-action">Save current theme</button>
                <div id="randomise-theme-btn" class="settings-action randomise-slider-btn" title="Drag to set brightness · click to randomise" style="cursor:pointer;overflow:hidden;position:relative;padding:0;">
                  <div id="randomise-slider-fill" style="position:absolute;top:0;left:0;height:100%;width:50%;pointer-events:none;border-radius:inherit;"></div>
                  <span id="randomise-slider-label" style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:6px;height:100%;padding:0 12px;font-size:0.88rem;">Randomise</span>
                </div>
              </div>
            </div>
            <div id="theme-presets-list" class="theme-presets-list"></div>
          </section>
          <section class="settings-section" data-section="privacy">
            <h3>Privacy</h3>
            <div class="settings-control">
              <label for="search-engine-select">Default search engine</label>
              <select id="search-engine-select">
                <option value="startpage">Startpage</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="brave">Brave Search</option>
                <option value="wikipedia">Wikipedia</option>
                <option value="ecosia">Ecosia</option>
                <option value="kagi">Kagi</option>
                <option value="reddit">Reddit</option>
                <option value="youtube">YouTube</option>
                <option value="github">GitHub</option>
                <option value="ebay">eBay</option>
                <option value="irs">IRS</option>
              </select>
            </div>
            <div class="settings-control switch-control">
              <label for="cookie-enabled">Enable cookies</label>
              <input type="checkbox" id="cookie-enabled" />
            </div>
            <div class="settings-control">
              <label for="cookie-level">Cookie level</label>
              <select id="cookie-level">
                <option value="allowAll">Allow all cookies</option>
                <option value="blockThirdParty">Block third-party cookies</option>
                <option value="blockCrossSite">Block cross-site cookies (strict)</option>
                <option value="blockAll">Block all cookies</option>
              </select>
            </div>
            <div class="settings-control">
              <label>Cookie exceptions</label>
              <div id="cookie-exceptions">
                <div class="cookie-exception-row">
                  <input type="text" placeholder="example.com" />
                  <select>
                    <option value="allow">Allow</option>
                    <option value="block">Block</option>
                  </select>
                </div>
                <div class="cookie-exception-row">
                  <input type="text" placeholder="example.com" />
                  <select>
                    <option value="allow">Allow</option>
                    <option value="block">Block</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="settings-control switch-control" style="margin-top:24px;">
              <label for="adblock-enabled" style="font-weight:600;">Enable ad blocker</label>
              <input type="checkbox" id="adblock-enabled" />
            </div>
            <div class="settings-control" style="margin-top:4px;">
              <div id="adblock-status" style="font-size:0.82rem;color:var(--muted);padding:2px 0;"></div>
              <button id="adblock-reload-btn" class="settings-action" style="margin-top:8px;">Reload block lists</button>
            </div>
            <div class="settings-control" style="margin-top:12px;">
              <button id="open-vault-btn" class="settings-action">View saved passwords</button>
            </div>
            <div class="settings-control buttons-grid">
              <button id="clear-cookies-btn" class="settings-action">Clear cookies</button>
              <button id="view-cookies-btn" class="settings-action">View cookies</button>
              <button id="clear-storage-btn" class="settings-action">Clear site storage</button>
              <button id="clear-all-btn" class="settings-action">Clear all data</button>
              <button id="clear-passwords-btn" class="settings-action">Clear saved passwords</button>
              <button id="clear-downloads-history-btn" class="settings-action">Clear download history</button>
              <button id="clear-history-btn" class="settings-action">Clear browsing history</button>
            </div>
            <div id="privacy-status" class="privacy-status"></div>
          </section>
          <section class="settings-section" data-section="history">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
              <h3 style="margin:0;">Browsing history</h3>
            </div>
            <div
              id="history-list-container"
              style="height:420px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,0.25) transparent;padding-right:4px;"
            ></div>
          </section>       
        </div>
      </div>
    </div>
    <div id="credential-save-modal" class="cred-toast-overlay" aria-hidden="true">
      <div class="cred-toast">
        <div class="cred-toast-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2a5 5 0 0 1 5 5v3H7V7a5 5 0 0 1 5-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="3" y="10" width="18" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
        </div>
        <div class="cred-toast-body">
          <div class="cred-toast-title">Save password?</div>
          <div id="credential-save-text" class="cred-toast-sub"></div>
        </div>
        <div class="cred-toast-actions">
          <button id="credential-save-confirm" class="cred-toast-btn cred-toast-btn--save">Save</button>
          <button id="credential-save-dismiss" class="cred-toast-btn cred-toast-btn--dismiss">✕</button>
        </div>
      </div>
    </div>
    <div id="master-password-modal" class="settings-modal" aria-hidden="true">
      <div class="settings-panel" style="width:min(380px,calc(100vw - 32px));max-height:unset;">
        <div class="settings-header">
          <div>
            <h2>Set master password</h2>
            <p style="margin:0;font-size:0.85rem;color:var(--muted);">Required to save or view passwords</p>
          </div>
        </div>
        <div class="settings-body" style="height:auto;gap:12px;display:flex;flex-direction:column;padding:20px 28px 24px;">
          <div class="settings-control" style="margin-top:0;">
            <label for="master-pw-input">Master password</label>
            <input type="password" id="master-pw-input" placeholder="Enter a strong password" />
          </div>
          <div class="settings-control" style="margin-top:0;">
            <label for="master-pw-confirm">Confirm password</label>
            <input type="password" id="master-pw-confirm" placeholder="Repeat password" />
          </div>
          <div id="master-pw-error" style="color:rgba(239,68,68,0.9);font-size:0.82rem;min-height:18px;"></div>
          <button id="master-pw-set-btn" class="settings-action" style="margin-top:4px;">Set master password</button>
        </div>
      </div>
    </div>
    <div id="vault-modal" class="settings-modal" aria-hidden="true">
      <div class="settings-panel" style="width:min(480px,calc(100vw - 32px));max-height:80vh;">
        <div class="settings-header">
          <div>
            <h2>Saved passwords</h2>
            <p style="margin:0;font-size:0.85rem;color:var(--muted);">Enter master password to view</p>
          </div>
          <button id="vault-modal-close" class="settings-close" title="Close">
            <img src="./icons/close.svg" alt="Close" />
          </button>
        </div>
        <div class="settings-body" style="height:auto;max-height:60vh;display:flex;flex-direction:column;gap:12px;padding:20px 28px 24px;">
          <div id="vault-locked" style="display:flex;flex-direction:column;gap:12px;">
            <div class="settings-control" style="margin-top:0;">
              <label for="vault-unlock-input">Master password</label>
              <input type="password" id="vault-unlock-input" placeholder="Enter master password" />
            </div>
            <div id="vault-unlock-error" style="color:rgba(239,68,68,0.9);font-size:0.82rem;min-height:18px;"></div>
            <button id="vault-unlock-btn" class="settings-action">Unlock vault</button>
          </div>
          <div id="vault-unlocked" style="display:none;flex-direction:column;gap:8px;overflow-y:auto;">
            <div id="vault-list"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="downloads-modal" class="settings-modal" aria-hidden="true">
      <div class="settings-panel downloads-panel">
        <div class="settings-header">
          <div>
            <h2>Downloads</h2>
            <p id="downloads-header-summary" class="downloads-summary-text"></p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button id="downloads-clear-completed-btn" class="settings-action downloads-header-action" title="Clear completed">Clear completed</button>
            <button id="downloads-modal-close" class="settings-close" title="Close downloads">
              <img src="./icons/close.svg" alt="Close" />
            </button>
          </div>
        </div>
        <div class="downloads-filter-bar">
          <button class="dl-filter-btn active" data-filter="all">All</button>
          <button class="dl-filter-btn" data-filter="active">Active</button>
          <button class="dl-filter-btn" data-filter="completed">Completed</button>
          <button class="dl-filter-btn" data-filter="failed">Failed</button>
        </div>
        <div class="settings-body downloads-body" id="downloads-list-container">
          <div class="downloads-empty" id="downloads-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 16L7 11h4V4h2v7h4l-5 5z" fill="currentColor" opacity="0.4"/>
              <path d="M20 18H4v2h16v-2z" fill="currentColor" opacity="0.4"/>
            </svg>
            <p>No downloads yet</p>
          </div>
          <div id="downloads-list"></div>
        </div>
      </div>
    </div>
    <div id="find-bar" class="find-bar" role="search" aria-label="Find in page">
      <input
        id="find-input"
        type="text"
        placeholder="Find in page…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search text"
      />
      <span id="find-count" class="find-count"></span>
      <button id="find-prev-btn" class="find-btn" title="Previous match (Shift+Enter)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="find-next-btn" class="find-btn" title="Next match (Enter)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="find-close-btn" class="find-btn find-btn--close" title="Close (Escape)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="bookmarks-modal" class="bookmarks-modal" aria-hidden="true">
      <div id="bookmarks-dropdown" class="bookmarks-dropdown"></div>
    </div>
    <div id="cookies-modal" class="settings-modal" aria-hidden="true">
      <div class="settings-panel" style="width:min(700px,calc(100vw - 32px));max-height:85vh;">
        <div class="settings-header">
          <div>
            <h2>Cookies</h2>
            <p id="cookies-header-summary" style="margin:0;font-size:0.88rem;color:var(--muted);">Loading…</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="cookies-search" type="text" placeholder="Filter by domain or name…"
              style="height:36px;padding:0 12px;border-radius:10px;border:var(--border-width) solid var(--border-color);background:var(--input-bg);color:var(--text);font-size:0.85rem;outline:none;width:220px;" />
            <button id="cookies-modal-close" class="settings-close" title="Close">
              <img src="./icons/close.svg" alt="Close" />
            </button>
          </div>
        </div>
        <div style="padding:0 28px 0;background:var(--panel);border-bottom:var(--border-width) solid var(--border-color);display:flex;gap:6px;">
          <button class="dl-filter-btn active" data-cookie-filter="all">All</button>
          <button class="dl-filter-btn" data-cookie-filter="session">Session</button>
          <button class="dl-filter-btn" data-cookie-filter="persistent">Persistent</button>
          <button class="dl-filter-btn" data-cookie-filter="secure">Secure</button>
